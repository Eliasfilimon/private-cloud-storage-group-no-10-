# Application Configuration
spring.application.name=Secure Cloud Storage
server.port=8080
server.tomcat.max-threads=200
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:secure_cloud_storage}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (Production-Optimized)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=false

# Timezone Configuration (Nairobi, EAT UTC+3)
spring.jackson.time-zone=Africa/Nairobi
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# File Upload Configuration (Production Limits)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=600MB
spring.servlet.multipart.file-size-threshold=10MB

# Request/Response Size Limits
server.tomcat.max-http-post-size=629145600
server.compression.enabled=true
server.compression.min-response-size=1024

# File Storage Configuration
file.upload-dir=./uploads
file.backup.location=./backups
file.max-size-per-user=10GB

# MinIO Configuration
minio.url=${MINIO_URL:http://localhost:9000}
minio.access.key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret.key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket.name=${MINIO_BUCKET:secure-cloud-storage}
minio.connection.timeout=30000
minio.write.timeout=60000
minio.read.timeout=30000

# JWT Configuration (Change secret in production!)
jwt.secret=${JWT_SECRET:}
jwt.refresh-secret=${JWT_REFRESH_SECRET:}
jwt.expiration=1800000
jwt.refresh-expiration=604800000

# Session Configuration (Server-side session management)
session.timeout-minutes=30
session.warning-time=60000

# Security Configuration
# Note: Remove these properties - using database authentication with BCrypt password encoding instead
# spring.security.user.name=admin
# spring.security.user.password=admin123

# Rate Limiting Configuration (Resilience4j)
# Default rate limiter (100 requests per second)
resilience4j.ratelimiter.instances.default.register-health-indicator=true
resilience4j.ratelimiter.instances.default.limit-for-period=100
resilience4j.ratelimiter.instances.default.limit-refresh-period=1s
resilience4j.ratelimiter.instances.default.timeout-duration=3s

# Upload rate limiter (10 uploads per second)
resilience4j.ratelimiter.instances.upload.register-health-indicator=true
resilience4j.ratelimiter.instances.upload.limit-for-period=10
resilience4j.ratelimiter.instances.upload.limit-refresh-period=1s
resilience4j.ratelimiter.instances.upload.timeout-duration=5s

# Authentication rate limiter (5 attempts per second)
resilience4j.ratelimiter.instances.auth.register-health-indicator=true
resilience4j.ratelimiter.instances.auth.limit-for-period=5
resilience4j.ratelimiter.instances.auth.limit-refresh-period=1s
resilience4j.ratelimiter.instances.auth.timeout-duration=3s

# Download rate limiter (20 downloads per second)
resilience4j.ratelimiter.instances.download.register-health-indicator=true
resilience4j.ratelimiter.instances.download.limit-for-period=20
resilience4j.ratelimiter.instances.download.limit-refresh-period=1s
resilience4j.ratelimiter.instances.download.timeout-duration=3s

# Admin rate limiter (20 requests per second)
resilience4j.ratelimiter.instances.admin.register-health-indicator=true
resilience4j.ratelimiter.instances.admin.limit-for-period=20
resilience4j.ratelimiter.instances.admin.limit-refresh-period=1s
resilience4j.ratelimiter.instances.admin.timeout-duration=3s

# Search rate limiter (50 searches per second)
resilience4j.ratelimiter.instances.search.register-health-indicator=true
resilience4j.ratelimiter.instances.search.limit-for-period=50
resilience4j.ratelimiter.instances.search.limit-refresh-period=1s
resilience4j.ratelimiter.instances.search.timeout-duration=3s

# Brute Force Protection
security.login.max-attempts=5
security.login.lockout-duration=900000

# API Versioning Configuration
api.version=v1
api.deprecated-versions=
api.enable-version-header=true

# Security Headers Configuration
security.headers.hsts.enabled=true
security.headers.hsts.max-age=31536000
security.headers.hsts.include-subdomains=true
security.headers.csp.enabled=true
security.headers.csp.policy=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'
security.headers.permissions-policy.enabled=true
security.headers.permissions-policy.policy=geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()

# Request Signing Configuration
security.request-signing.enabled=false
security.request-signing.algorithm=HmacSHA256
security.request-signing.timestamp-tolerance=300000

# Logging Configuration for Security
logging.level.com.udom.securecloud.security=DEBUG
logging.level.com.udom.securecloud.filter=DEBUG

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.prometheus.metrics.export.enabled=true
management.health.db.enabled=true
management.health.mail.enabled=false
management.metrics.tags.application=${spring.application.name:secure-cloud-storage}

# Cache Configuration (In-memory)
spring.cache.type=simple

# Logging Configuration (Production)
logging.level.com.udom.securecloud=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.io.minio=WARN
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5173
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed.headers=Authorization,Cache-Control,Content-Type,Accept,X-Requested-With
cors.exposed.headers=Authorization
cors.allow.credentials=true
cors.max.age=3600

# Backup Configuration
backup.enabled=true
backup.schedule=0 0 2 * * *
backup.location=./backups
backup.retention-days=30

# Password Complexity
password.min-length=8
password.require-uppercase=true
password.require-lowercase=true
password.require-digits=true
password.require-special=true

# Email Configuration (SMTP)
# Set SMTP_USERNAME and SMTP_PASSWORD in your .env file or Docker environment to enable emails.
# If not set, the app will still start normally — email sending will be silently skipped.
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.protocol=smtp
# IMPORTANT: Set to false so Spring doesn't fail on startup when SMTP is unconfigured
spring.mail.test-connection=false
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${SMTP_FROM:noreply@udom.ac.tz}

# Frontend URL for password reset links in emails.
# In production set FRONTEND_URL to your actual domain, e.g. https://cloud.udom.ac.tz
app.frontend-url=${FRONTEND_URL:http://localhost:3002}

# SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=true
springdoc.packages-to-scan=com.udom.securecloud.controller

# Initial Admin User Configuration (only used when database is empty)
# Set these via environment variables for security:
#   APP_INITIAL_ADMIN_EMAIL
#   APP_INITIAL_ADMIN_PASSWORD
#   APP_INITIAL_ADMIN_FIRST_NAME
#   APP_INITIAL_ADMIN_LAST_NAME
app.initial-admin.email=${APP_INITIAL_ADMIN_EMAIL:admin@udom.ac.tz}
app.initial-admin.password=${APP_INITIAL_ADMIN_PASSWORD:}
app.initial-admin.first-name=${APP_INITIAL_ADMIN_FIRST_NAME:System}
app.initial-admin.last-name=${APP_INITIAL_ADMIN_LAST_NAME:Administrator}
