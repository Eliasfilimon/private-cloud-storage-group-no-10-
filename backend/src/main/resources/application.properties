# Application Configuration
spring.application.name=Secure Cloud Storage
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/secure_cloud_storage
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# File Storage Configuration
file.upload-dir=./uploads
file.backup.location=./backups

# JWT Configuration (Change secret in production!)
jwt.secret=dGhpc2lzYXNlY3JldGtleWZvcmp3dHRva2VuZ2VuZXJhdGlvbmNoYW5nZXRoaXNpbnByb2R1Y3Rpb25lbnZpcm9ubWVudA==
jwt.expiration=86400000

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging Configuration
logging.level.tz.ac.udom=DEBUG
logging.level.org.springframework.security=DEBUG
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration
cors.allowed-origins=http://localhost:3000
