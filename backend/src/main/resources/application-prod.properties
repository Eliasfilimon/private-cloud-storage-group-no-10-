# Production Configuration - STRICT SECURITY SETTINGS
# This file overrides application.properties with production-specific settings
# NEVER commit secrets to this file - use environment variables only

# Database Configuration - Use environment variables
spring.datasource.url=${DATABASE_URL:}
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA/Hibernate - NO AUTO CREATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Encryption - From environment variable only
encryption.master-key=${MASTER_ENCRYPTION_KEY:}

# JWT - From environment variables only
jwt.secret=${JWT_SIGNING_SECRET:}
jwt.refresh-secret=${JWT_REFRESH_SECRET:}

# Server Security
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=15m

# Logging - MINIMAL in production
logging.level.root=WARN
logging.level.com.udom.securecloud=INFO
logging.level.com.udom.securecloud.security=WARN

# Disable actuator endpoints in production
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# File Upload - Use environment variables for paths
file.upload-dir=${FILE_UPLOAD_DIR:/secure-data/uploads}
file.backup.location=${FILE_BACKUP_DIR:/secure-data/backups}

# CORS - Restrict to production domain only
server.servlet.session.cookie.domain=${PROD_DOMAIN:}
