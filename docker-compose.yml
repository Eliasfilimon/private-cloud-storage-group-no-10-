services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: scs_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-secure_cloud_storage}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - scs_network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scs_backend
    environment:
      TZ: Africa/Nairobi
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:55432/${DB_NAME:-secure_cloud_storage}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      FILE_UPLOAD_DIR: /app/uploads
      FILE_BACKUP_LOCATION: /app/backups
      MINIO_URL: http://host.docker.internal:9002
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET:-secure-cloud-storage}
      MASTER_ENCRYPTION_KEY: HaJ2TiGSEIhVEIbN+vb/G9Txh1QIUvG5v9OcCQz8ILY=
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3002,http://localhost:5173,http://localhost,${FRONTEND_URL:-http://localhost:3002}
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
      - backend_backups:/app/backups
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - scs_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Web Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scs_frontend
    ports:
      - "3002:3000"
    environment:
      TZ: Africa/Nairobi
      VITE_API_URL: /api
    depends_on:
      - backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - scs_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: scs_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
      # Native MinIO Server-Side Encryption (SSE) using built-in KMS
      # Format: key-name:base64-encoded-32-byte-key
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:-minio-master-key:f931adW+meqiDN8TY+ksBSLSNDdbLgVJlpJisFbqgzk=}
      # Auto-encrypt ALL objects stored in MinIO (double-encryption layer)
      MINIO_KMS_AUTO_ENCRYPTION: "on"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - scs_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: scs_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - scs_network

  # AlertManager for Alert Notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: scs_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - scs_network

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: scs_grafana
    environment:
      # Require strong password - will fail if GRAFANA_ADMIN_PASSWORD not set
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env file}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      # Disable signup and anonymous access for security
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # AlertManager integration
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/alerting:/etc/grafana/provisioning/alerting
    depends_on:
      - prometheus
      - loki
      - alertmanager
    restart: unless-stopped
    networks:
      - scs_network

  # Loki Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: scs_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - scs_network

  # Promtail Log Collector
  promtail:
    image: grafana/promtail:latest
    container_name: scs_promtail
    volumes:
      - backend_logs:/var/log/app:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - scs_network

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  backend_uploads:
  backend_backups:
  backend_logs:

networks:
  scs_network:
    driver: bridge
