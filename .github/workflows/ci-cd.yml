name: UDOM Secure Cloud CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Fixed image name — repo name has a trailing hyphen which breaks Docker tags
  IMAGE_BASE: ghcr.io/eliasfilimon/udom-secure-cloud

jobs:
  # ──────────────────────────────────────────────
  # 1. Build & verify the Spring Boot backend
  # ──────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -DskipTests

  # ──────────────────────────────────────────────
  # 2. Build & lint the React frontend
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: Build
        working-directory: ./frontend
        run: npm run build

  # ──────────────────────────────────────────────
  # 3. Build & push Docker images to GHCR
  #    Only runs on push to main (not PRs)
  # ──────────────────────────────────────────────
  docker-publish:
    name: Publish Docker Images
    needs: [ build-backend, build-frontend ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: ./backend
            image_suffix: backend
          - context: ./frontend
            image_suffix: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.image_suffix }}:latest
            ${{ env.IMAGE_BASE }}-${{ matrix.image_suffix }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
