name: UDOM Secure Cloud CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build with Maven
      working-directory: ./backend
      # Running package but skipping tests for now, adjust when test suite is fully wired
      run: mvn clean package -DskipTests

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
      
    - name: Lint Frontend
      working-directory: ./frontend
      run: npm run lint
      continue-on-error: true # Let it pass even if there are lint warnings
      
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

  docker-build:
    name: Build Docker Images
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    # Only build Docker images when code is pushed to main (not for PRs)
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false # Change to true when configuring a container registry
        tags: udom-secure-cloud-backend:latest
        
    - name: Build Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: false # Change to true when configuring a container registry
        tags: udom-secure-cloud-frontend:latest
