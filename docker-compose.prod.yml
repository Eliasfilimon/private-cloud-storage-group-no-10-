# Docker Compose Production Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  db:
    restart: always
    environment:
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C --max_connections=200"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  backend:
    restart: always
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xmx1g -Xms1g -XX:+UseG1GC"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
      replicas: 2

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  minio:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  prometheus:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  grafana:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  loki:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  promtail:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
