global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@udom.ac.tz'
  smtp_auth_username: ''
  smtp_auth_password: ''

# The root route on which each incoming alert enters.
route:
  # The labels by which incoming alerts are grouped together.
  group_by: ['alertname', 'severity']
  
  # When a new group of alerts is created, wait for 'group_wait' to send the initial notification.
  group_wait: 30s
  
  # When the first notification was sent, wait 'group_interval' to send a batch of new alerts.
  group_interval: 5m
  
  # If an alert has successfully been sent, wait 'repeat_interval' to resend them.
  repeat_interval: 4h
  
  # A default receiver
  receiver: 'default'
  
  # Routes for different severity levels
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'

# Receivers define how alerts are sent
receivers:
  - name: 'default'
    # Default receiver - logs to console only
    # Configure email/webhook for production
    
  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@udom.ac.tz'
        headers:
          Subject: 'UDOM Cloud - CRITICAL Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt }}
          {{ end }}
        
  - name: 'warning-alerts'
    email_configs:
      - to: 'admin@udom.ac.tz'
        headers:
          Subject: 'UDOM Cloud - Warning: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt }}
          {{ end }}

# Inhibition rules allow silencing alerts when another alert is firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
