groups:
  - name: udom-cloud-backend
    interval: 15s
    rules:
      # Backend Down Alert
      - alert: BackendDown
        expr: up{job="spring-boot-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"
          description: "The Spring Boot backend has been down for more than 1 minute"

      # High Memory Usage Alert
      - alert: HighMemoryUsage
        expr: (jvm_memory_used_bytes / jvm_memory_max_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM memory usage is above 80%"
          description: "The backend memory usage has been above 80% for more than 5 minutes"

      # High Disk Usage Alert
      - alert: HighDiskUsage
        expr: (1 - (disk_free_bytes / disk_total_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage is above 90%"
          description: "The server disk usage has been above 90% for more than 5 minutes"

      # Database Connection Pool Alert
      - alert: DatabasePoolExhausted
        expr: (hikaricp_connections_active / (hikaricp_connections_active + hikaricp_connections_idle)) > 0.9
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool is nearly exhausted"
          description: "More than 90% of database connections are in use"

      # High Error Rate Alert
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "The backend is experiencing a high rate of server errors"

      # Slow Response Time Alert
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API response time is slow"
          description: "95th percentile response time is above 2 seconds"

      # CPU Usage Alert (if available via custom metrics)
      - alert: HighCPUUsage
        expr: system_cpu_usage > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "System CPU usage is above 80%"
